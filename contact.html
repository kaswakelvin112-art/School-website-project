<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="images/royal-giant-high-school-mityana-logo-png_seeklogo-556113.jpg">
    <link rel="stylesheet" href="styles.css">
    <title>Contact</title>
</head>
<body>
    <header></header>
    <main>
        <h1>Contact Us</h1>
        <p>Having questions about admission or inquiries about the school?</p>
        <p>We are always happy to hear from you.</p>
        <div class="inquiryForm">
            <form action="">
                <fieldset>
                    <legend>User information</legend>
                    <div class="dataset">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name">
                    </div>
                    <div class="dataset">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email">
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Remark</legend>
                    <div class="dataset">
                        <label for="remark">Your Message:</label>
                        <textarea id="remark" name="remark" placeholder="Enter your message"></textarea>
                    </div>
                </fieldset>
            </form>
        </div>
        <div class="other-contacts">
            <div class="contact">
                <img src="./socials/call-outline.svg" alt="phone-icon">
                <p ><a href="tel:0392828154">0392828154</a></p>
                <p><a href="tel:+256776004201">+256776004201</a></p>
                <p><a href="tel:+256702330727">+256702330727</a></p>
            </div>
            <div class="email">
                <img src="./socials/mail-outline.svg" alt="email-icon">
                <p role="email"><a href="mailto:royalgianthigh@gmail.com">royalgianthigh@gmail.com</a></p>
            </div>
        </div>
        <div class="google-map">
            <h2>Find us on </h2>
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.7258139569035!2d32.06800547398378!3d0.39016451391083296!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x177d19ef91cc13c3%3A0x67d65a1b5aa1c934!2sRoyal%20Giant%20Secondary%20School!5e0!3m2!1sen!2sug!4v1776946871257!5m2!1sen!2sug" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </main>
    <footer></footer>
    <script src="script.js"></script>
</body>
</html>
